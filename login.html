<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.box {
    background:white;
    padding:25px;
    border-radius:12px;
    width:300px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h2 { margin-bottom:15px; }

input {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}

button {
    width:100%;
    padding:10px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#1877f2;
    color:white;
    font-size:15px;
    cursor:pointer;
}

button:hover {
    background:#0d6efd;
}

.error {
    color:red;
    margin-top:10px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="box">
    <h2>Admin Login</h2>
    <input type="password" id="pass" placeholder="Nhập mật khẩu">
    <button onclick="login()">Đăng nhập</button>
    <div id="error" class="error"></div>
</div>

<script>
const PASSWORD = "123123@@qq"; // 🔒 đổi mật khẩu tại đây

function login(){
    const input = document.getElementById("pass").value;

    if(input === PASSWORD){
        // lưu trạng thái đăng nhập
        localStorage.setItem("isAdmin","true");

        // chuyển sang admin
        window.location.href = "admin.html";
    } else {
        document.getElementById("error").innerText = "Sai mật khẩu!";
    }
}
</script>

</body>
</html>
