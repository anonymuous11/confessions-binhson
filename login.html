<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; background: #f4f6f9; padding: 20px; }
.container { max-width: 1000px; margin: auto; }
.section { background: white; padding: 16px; border-radius: 10px; margin-bottom: 20px; }
.card { border-bottom: 1px solid #ddd; padding: 10px 0; }
button { margin: 5px; padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer; }
.danger { background: red; color: white; }
.success { background: green; color: white; }
.warning { background: orange; color: white; }

.badge { padding: 3px 8px; border-radius: 10px; font-size: 12px; margin-left: 8px; }
.pinned { background: gold; }

.notification {
    position: fixed;
    top: 20px;
    right: 20px;
    background: white;
    padding: 10px;
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    cursor: pointer;
}
.badge-count {
    position: absolute;
    top: -5px;
    right: -5px;
    background: red;
    color: white;
    border-radius: 50%;
    font-size: 12px;
    padding: 2px 6px;
}
</style>
</head>
<body>

<div class="notification" onclick="scrollToReports()">
    🔔 <span id="badge" class="badge-count" style="display:none">0</span>
</div>

<div class="container">
    <h2>🔐 Admin Panel</h2>

    <div class="section">
        <h3>📌 Bài viết</h3>
        <div id="posts"></div>
    </div>

    <div class="section" id="reportsSection">
        <h3>🚨 Báo cáo</h3>
        <div id="reports"></div>
    </div>
</div>

<script>
// 🔐 PASSWORD
const PASSWORD = "123123@@qq";
if(prompt("Nhập mật khẩu") !== PASSWORD){
    document.body.innerHTML = "Access Denied";
    throw "";
}

// 🔥 Firebase
const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "binhson-confessions.firebaseapp.com",
    databaseURL: "https://binhson-confessions-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "binhson-confessions"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const postsRef = db.ref("confessions");
const reportsRef = db.ref("reports");

// 📌 GHIM
function togglePin(id, status){
    postsRef.child(id).update({ pinned: status });
}

// 🗑 XÓA
function deletePost(id){
    if(confirm("Xóa bài này?")){
        postsRef.child(id).remove();
        reportsRef.child(id).remove();
    }
}

// 🔢 Đếm comment (có reply)
function countComments(obj){
    if(!obj) return 0;
    let count = 0;
    for(let key in obj){
        count++;
        if(obj[key].replies){
            count += countComments(obj[key].replies);
        }
    }
    return count;
}

// 🧠 LOAD POSTS + SỐ THỨ TỰ
postsRef.on("value", snap => {
    const container = document.getElementById("posts");
    container.innerHTML = "";

    const posts = [];

    snap.forEach(child => {
        const p = child.val();
        p.id = child.key;
        posts.push(p);
    });

    // 📌 ghim + mới nhất
    posts.sort((a,b)=>{
        if(a.pinned && !b.pinned) return -1;
        if(!a.pinned && b.pinned) return 1;
        return b.timestamp - a.timestamp;
    });

    let counter = posts.length;

    posts.forEach(p=>{
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>#${counter--} ${p.pinned ? "📌" : ""}</b>
            <div style="margin:5px 0">${escapeHtml(p.content)}</div>
            👍 ${p.likes || 0} | 💬 ${countComments(p.comments)}
            <br>
            <button class="${p.pinned ? 'warning':'success'}"
                onclick="togglePin('${p.id}', ${!p.pinned})">
                ${p.pinned ? "Bỏ ghim":"Ghim"}
            </button>
            <button class="danger" onclick="deletePost('${p.id}')">Xóa</button>
        `;

        container.appendChild(div);
    });
});

// 🚨 LOAD REPORT + HIỆN NỘI DUNG BÀI
reportsRef.on("value", async snap=>{
    const container = document.getElementById("reports");
    container.innerHTML = "";

    let total = 0;

    if(!snap.exists()){
        container.innerHTML = "Không có báo cáo";
        document.getElementById("badge").style.display="none";
        return;
    }

    for (let postSnap of Object.values(snap.val())) {}

    snap.forEach(post=>{
        const postId = post.key;

        post.forEach(async r=>{
            total++;

            const data = r.val();

            // 🔥 lấy nội dung bài viết
            const postDataSnap = await postsRef.child(postId).once("value");
            const postData = postDataSnap.val();

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <b>Bài: ${postId.slice(0,8)}...</b>
                <div style="background:#f1f1f1;padding:6px;border-radius:6px;margin:5px 0">
                    ${postData ? escapeHtml(postData.content) : "❌ Bài đã bị xóa"}
                </div>
                👤 ${escapeHtml(data.reporter)}
                <br>📝 ${escapeHtml(data.reason)}
                <br>🕒 ${new Date(data.timestamp).toLocaleString()}
                <br>
                <button class="danger" onclick="deletePost('${postId}')">Xóa bài</button>
                <button onclick="deleteReport('${postId}','${r.key}')">Xóa báo cáo</button>
            `;

            container.appendChild(div);
        });
    });

    // 🔔 badge
    const badge = document.getElementById("badge");
    if(total > 0){
        badge.innerText = total > 99 ? "99+" : total;
        badge.style.display = "inline-block";
    } else {
        badge.style.display = "none";
    }
});

// ❌ xóa report
function deleteReport(postId, reportId){
    reportsRef.child(`${postId}/${reportId}`).remove();
}

// 📍 scroll
function scrollToReports(){
    document.getElementById("reportsSection").scrollIntoView({behavior:"smooth"});
}

// 🔒 escape
function escapeHtml(str){
    if(!str) return "";
    return str.replace(/[&<>]/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;"
    })[m]);
}
</script>

</body>
</html>
