<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông báo</title>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;900&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    background-image: url("pic/logooo.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    font-family: 'Be Vietnam Pro', sans-serif;
}

/* Khối nội dung */
.container {
    text-align: center;
    width: 90%;          /* co theo màn hình */
    max-width: 600px;

    background: rgba(255, 255, 255, 0.85);
    padding: 25px;
    border-radius: 15px;

    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

/* Tiêu đề */
h1 {
    margin-bottom: 15px;
    font-weight: 900;

    font-size: 22px;     /* mobile */
}

/* Nội dung */
p {
    line-height: 1.6;
    font-weight: 600;

    font-size: 15px;     /* mobile */
}

/* 📱 Responsive cho màn hình lớn hơn */
@media (min-width: 768px) {
    h1 {
        font-size: 32px;
    }

    p {
        font-size: 18px;
    }

    .container {
        padding: 35px;
    }
}
</style>

</head>
<body>

<div class="container">
    <h1>ĐÓNG WEB ĐỂ UPDATE<br>TÍNH NĂNG DUYỆT BÀI</h1>

    <p>
        TRANG WEB NÀY VỚI MỤC ĐÍCH TRÒ CHUYỆN VÀ HỌC TẬP.<br>
        KHÔNG DÙNG ĐỂ BÔI NHỌ NGƯỜI KHÁC
    </p>
</div>

</body>
</html>
