<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Diễn đàn trò chuyện ẩn danh</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; line-height: 1.34; color: #1c1e21; }
.container { max-width: 680px; margin: 0 auto; padding: 16px; }

.rules-box-fixed { position: fixed; top: 20px; left: 20px; width: 280px; background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); font-size: 13px; z-index: 1000; border: 1px solid #e4e6eb; }
.rules-box-fixed h3 { font-size: 15px; margin-bottom: 12px; }
.rules-box-fixed ul { padding-left: 20px; }
.rules-box-fixed li { margin: 8px 0; color: #65676b; }

.header { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
.logo-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-bottom: 8px; }

/* Ô thông báo riêng */
.announcement-box {
    background: linear-gradient(135deg, #fff3e0 0%, #ffe8cc 100%);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    border-left: 5px solid #ff9800;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    display: none;
    position: relative;
}
.announcement-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
}
.announcement-header h3 {
    font-size: 16px;
    color: #e65100;
}
.announcement-content {
    font-size: 14px;
    line-height: 1.5;
    color: #333;
    margin-bottom: 12px;
}
.announcement-time {
    font-size: 11px;
    color: #999;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.close-announcement {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: #999;
    padding: 0 8px;
}
.close-announcement:hover {
    color: #333;
}
.snooze-btn {
    background: none;
    border: 1px solid #ff9800;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    cursor: pointer;
    color: #ff9800;
}
.snooze-btn:hover {
    background: #ff9800;
    color: white;
}

.post-box { background: white; border-radius: 12px; margin-bottom: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); overflow: hidden; }
.post-top { display: flex; align-items: center; padding: 12px 16px; cursor: pointer; transition: background 0.2s; }
.post-top:hover { background: #f5f5f5; }
.avatar { width: 40px; height: 40px; border-radius: 50%; background: #e4e6eb; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.fake-input { margin-left: 12px; background: #f0f2f5; padding: 10px 16px; border-radius: 40px; flex: 1; color: #65676b; font-size: 15px; }

#realPost { padding: 16px; border-top: 1px solid #e4e6eb; display: none; }
textarea { width: 100%; font-size: 15px; border-radius: 8px; padding: 12px; border: 1px solid #e4e6eb; font-family: inherit; resize: vertical; margin-bottom: 12px; }
.btn-post { background: #1877f2; color: white; border: none; padding: 10px; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }

.card { background: white; border-radius: 12px; margin-bottom: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
.post-header { padding: 12px 16px; }
.post-author { font-weight: 600; font-size: 15px; }
.post-time { font-size: 13px; color: #65676b; margin-left: 8px; }
.post-number { font-weight: 600; color: #1877f2; margin-right: 6px; }
.today-badge { background: #e7f3ff; color: #1877f2; font-size: 12px; padding: 2px 8px; border-radius: 12px; margin-left: 8px; }
.post-content { padding: 0 16px 12px; font-size: 15px; line-height: 1.5; }
.post-stats { padding: 8px 16px; border-top: 1px solid #e4e6eb; display: flex; justify-content: space-between; font-size: 13px; color: #65676b; }
.post-actions { display: flex; border-top: 1px solid #e4e6eb; }
.post-actions button { flex: 1; background: none; border: none; padding: 10px; font-weight: 600; color: #65676b; cursor: pointer; }
.post-actions button:hover { background: #f0f2f5; }

.comment-section { padding: 12px 16px; border-top: 1px solid #e4e6eb; background: #fff; display: none; }
.comment-input-wrapper { display: flex; gap: 8px; margin-bottom: 12px; }
.comment-input-wrapper input { flex: 1; border: none; background: #f0f2f5; padding: 8px 16px; border-radius: 20px; font-size: 14px; }
.comment-node { margin-bottom: 12px; }
.comment-main { display: flex; gap: 8px; }
.comment-bubble { background: #f0f2f5; border-radius: 18px; padding: 8px 12px; flex: 1; }
.comment-name { font-weight: 600; font-size: 13px; }
.comment-text { font-size: 14px; margin-top: 2px; }
.comment-actions { margin-top: 4px; font-size: 12px; color: #65676b; font-weight: 600; }
.comment-actions span { cursor: pointer; margin-right: 12px; }
.reply-children { margin-left: 40px; margin-top: 8px; border-left: 2px solid #e4e6eb; padding-left: 10px; }
.reply-input-box { margin-left: 40px; margin-top: 8px; display: none; }
.reply-input-box input { width: 100%; background: #f0f2f5; border: none; padding: 6px 12px; border-radius: 20px; font-size: 13px; }

@media (max-width: 768px) { 
    .rules-box-fixed { display: none; }
}
</style>
</head>
<body>

<div class="rules-box-fixed">
    <h3>📜 Nội quy diễn đàn</h3>
    <ul>
        <li>💬 Chat vui vẻ, tôn trọng</li>
        <li>🚫 Không từ ngữ thô tục</li>
        <li>📚 Phục vụ học tập</li>
        <li>🔒 Mọi bài viết ẩn danh</li>
    </ul>
</div>

<div class="container">
    <div class="header">
        <img src="pic/logo.jpeg" alt="logo" class="logo-img" onerror="this.src='https://via.placeholder.com/50'">
        <h2>Diễn Đàn Ẩn Danh</h2>
    </div>

    <!-- Ô thông báo riêng từ admin -->
    <div id="announcementBox" class="announcement-box">
        <div class="announcement-header">
            <span>📢</span>
            <h3>Thông báo từ Ban Quản Trị</h3>
        </div>
        <div class="announcement-content" id="announcementContent">
            Nội dung thông báo sẽ hiển thị tại đây
        </div>
        <div class="announcement-time">
            <span id="announcementTime"></span>
            <div>
                <button class="close-announcement" onclick="closeAnnouncement()">✕</button>
            </div>
        </div>
    </div>

    <div class="post-box">
        <div class="post-top" onclick="openPost()">
            <div class="avatar">🙂</div>
            <div class="fake-input">Bạn đang nghĩ gì?</div>
        </div>
        <div id="realPost">
            <textarea id="content" rows="3" placeholder="Chia sẻ suy nghĩ của bạn..."></textarea>
            <label style="display: flex; align-items: center; font-size: 13px; margin-bottom: 10px;">
                <input type="checkbox" id="agreeRule" style="margin-right: 8px;"> Tôi đồng ý với nội quy
            </label>
            <button class="btn-post" onclick="postData()">Đăng bài</button>
        </div>
    </div>

    <div id="list"></div>
</div>

<script>
// Firebase config
const firebaseConfig = {
    apiKey: "AIzaSyB3xZIYvP5Pq1SXx5uqxkXqQ3LxW7Qn2Xk",
    authDomain: "binhson-confessions.firebaseapp.com",
    databaseURL: "https://binhson-confessions-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "binhson-confessions"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const postsRef = db.ref("confessions");
const reportsRef = db.ref("reports");
const announcementsRef = db.ref("announcements");

let postCounter = 0;

// ========== HÀM ĐẾM COMMENT CẤP 1 (KHÔNG TÍNH REPLY) ==========
function countTopLevelComments(commentsObj) {
    if (!commentsObj) return 0;
    let count = 0;
    for (let key in commentsObj) {
        count++; // Chỉ đếm comment cha, không đếm reply con
    }
    return count;
}

// ========== HÀM XỬ LÝ THÔNG BÁO RIÊNG ==========
function showAnnouncement(message, timestamp, announcementId) {
    const snoozeUntil = localStorage.getItem("announcement_snooze_until");
    if (snoozeUntil && parseInt(snoozeUntil) > Date.now()) {
        return;
    }
    
    const closedId = localStorage.getItem("closed_announcement_id");
    if (closedId && closedId === announcementId) {
        return;
    }
    
    const box = document.getElementById("announcementBox");
    const content = document.getElementById("announcementContent");
    const timeSpan = document.getElementById("announcementTime");
    
    content.innerHTML = message;
    timeSpan.innerHTML = "🕒 " + new Date(timestamp).toLocaleString('vi-VN');
    box.style.display = "block";
    box.setAttribute("data-current-id", announcementId);
}

function closeAnnouncement() {
    const box = document.getElementById("announcementBox");
    const currentId = box.getAttribute("data-current-id");
    if (currentId) {
        localStorage.setItem("closed_announcement_id", currentId);
    }
    box.style.display = "none";
}

function snoozeAnnouncement() {
    const snoozeUntil = Date.now() + 3600000;
    localStorage.setItem("announcement_snooze_until", snoozeUntil);
    closeAnnouncement();
}

announcementsRef.on("child_added", (snapshot) => {
    const announcement = snapshot.val();
    if (announcement && announcement.message && announcement.timestamp) {
        showAnnouncement(announcement.message, announcement.timestamp, snapshot.key);
    }
});

// ========== HÀM BÁO CÁO BÀI VIẾT ==========
function reportPost(postId) {
    const reason = prompt("📝 Nhập lý do báo cáo bài viết này:\n(Vi phạm nội quy, spam, nội dung nhạy cảm, ...)");
    if (!reason || reason.trim() === "") {
        alert("Bạn chưa nhập lý do báo cáo!");
        return;
    }
    
    const reportData = {
        reason: reason.trim(),
        reporter: getUserName(),
        timestamp: Date.now(),
        postId: postId
    };
    
    reportsRef.child(postId).push(reportData)
        .then(() => {
            alert("✅ Cảm ơn bạn đã báo cáo. Quản trị viên sẽ xem xét và xử lý.");
        })
        .catch(error => {
            console.error("Lỗi khi gửi báo cáo:", error);
            alert("❌ Có lỗi xảy ra, vui lòng thử lại sau!");
        });
}

// ========== CÁC HÀM HIỆN CÓ ==========
function getUserName() {
    let name = localStorage.getItem("anonName");
    if (!name) {
        name = "Ẩn danh " + Math.floor(Math.random() * 10000);
        localStorage.setItem("anonName", name);
    }
    return name;
}

function openPost() { 
    document.getElementById("realPost").style.display = "block"; 
}

function escapeHtml(text) { 
    if (!text) return "";
    const div = document.createElement('div'); 
    div.textContent = text; 
    return div.innerHTML; 
}

function formatTime(ts) {
    if (!ts) return "";
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60) return "Vừa xong";
    if (diff < 3600) return Math.floor(diff / 60) + " phút trước";
    if (diff < 86400) return Math.floor(diff / 3600) + " giờ trước";
    return new Date(ts).toLocaleDateString('vi-VN');
}

function isToday(ts) { 
    return new Date(ts).toDateString() === new Date().toDateString(); 
}

function postData() {
    const text = document.getElementById("content").value.trim();
    if (!text || !document.getElementById("agreeRule").checked) {
        alert("Vui lòng nhập nội dung và đồng ý nội quy!"); 
        return;
    }
    postsRef.push({ 
        content: text, 
        timestamp: Date.now(), 
        likes: 0
    });
    document.getElementById("content").value = "";
    document.getElementById("realPost").style.display = 'none';
}

function toggleComment(id) {
    const section = document.getElementById(`comment-section-${id}`);
    if (!section) return;
    const isHidden = section.style.display === 'none' || section.style.display === '';
    section.style.display = isHidden ? 'block' : 'none';
    if (isHidden && section.getAttribute('data-listener') !== 'true') {
        attachCommentsListener(id);
        section.setAttribute('data-listener', 'true');
    }
}

function attachCommentsListener(postId) {
    const listDiv = document.getElementById(`comment-list-${postId}`);
    const countSpan = document.getElementById(`comment-count-${postId}`);
    
    db.ref(`confessions/${postId}/comments`).on('value', snap => {
        const comments = snap.val();
        // CHỈ ĐẾM COMMENT CẤP 1, KHÔNG TÍNH REPLY
        const count = countTopLevelComments(comments);
        
        // Cập nhật hiển thị số lượng bình luận
        if (count === 0) {
            countSpan.innerText = "Chưa có bình luận";
        } else if (count === 1) {
            countSpan.innerText = "1 bình luận";
        } else {
            countSpan.innerText = count + " bình luận";
        }
        
        // Render lại danh sách comment
        if (listDiv) {
            listDiv.innerHTML = '';
            if (comments) listDiv.appendChild(renderCommentTree(postId, comments));
        }
    });
}

function renderCommentTree(postId, commentsObj) {
    const fragment = document.createDocumentFragment();
    for (let cmtId in commentsObj) {
        const cmt = commentsObj[cmtId];
        const div = document.createElement('div');
        div.className = 'comment-node';
        div.innerHTML = `
            <div class="comment-main">
                <div class="avatar" style="width:32px; height:32px; font-size:14px;">🙂</div>
                <div class="comment-bubble">
                    <div class="comment-name">${escapeHtml(cmt.name)}</div>
                    <div class="comment-text">${escapeHtml(cmt.text)}</div>
                    <div class="comment-actions"><span onclick="showReplyBox('${cmtId}')">Trả lời</span></div>
                </div>
            </div>
            <div class="reply-input-box" id="reply-box-${cmtId}">
                <input type="text" placeholder="Viết trả lời..." onkeypress="if(event.key==='Enter') addReply('${postId}', '${cmtId}', this)">
            </div>
            <div class="reply-children" id="replies-${cmtId}"></div>
        `;
        if (cmt.replies) {
            div.querySelector('.reply-children').appendChild(renderCommentTree(postId, cmt.replies));
        }
        fragment.appendChild(div);
    }
    return fragment;
}

function showReplyBox(cmtId) {
    const box = document.getElementById(`reply-box-${cmtId}`);
    if (box) {
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
        if (box.style.display === 'block') box.querySelector('input').focus();
    }
}

function addComment(postId) {
    const input = document.getElementById(`comment-input-${postId}`);
    const text = input.value.trim();
    if (!text) return;
    db.ref(`confessions/${postId}/comments`).push({ 
        name: getUserName(), 
        text, 
        timestamp: Date.now() 
    });
    input.value = '';
}

function addReply(postId, parentId, input) {
    const text = input.value.trim();
    if (!text) return;
    db.ref(`confessions/${postId}/comments/${parentId}/replies`).push({ 
        name: getUserName(), 
        text, 
        timestamp: Date.now() 
    });
    input.value = '';
    const box = document.getElementById(`reply-box-${parentId}`);
    if (box) box.style.display = 'none';
}

function likePost(id) { 
    db.ref(`confessions/${id}/likes`).transaction(c => (c || 0) + 1);
}

// Cập nhật số thứ tự
function updatePostNumbers() {
    const cards = document.querySelectorAll('#list .card');
    const total = cards.length;
    cards.forEach((card, index) => {
        const numberSpan = card.querySelector('.post-number');
        if (numberSpan) {
            numberSpan.innerText = `#${total - index}`;
        }
    });
    postCounter = total;
}

// Render bài viết
function renderPost(id, post) {
    if (document.querySelector(`.card[data-id="${id}"]`)) {
        const likeSpan = document.getElementById(`like-count-${id}`);
        if (likeSpan && likeSpan.innerText != (post.likes || 0)) {
            likeSpan.innerText = post.likes || 0;
        }
        return;
    }
    
    postCounter++;
    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-id', id);
    
    card.innerHTML = `
        <div class="post-header">
            <span class="post-number">#${postCounter}</span>
            <span class="post-author">Ẩn danh</span>
            <span class="post-time">${formatTime(post.timestamp)}</span>
            ${isToday(post.timestamp) ? '<span class="today-badge">Hôm nay</span>' : ''}
        </div>
        <div class="post-content">${escapeHtml(post.content)}</div>
        <div class="post-stats">
            <span>👍 <span id="like-count-${id}">${post.likes || 0}</span></span>
            <span>💬 <span id="comment-count-${id}">Đang tải...</span></span>
        </div>
        <div class="post-actions">
            <button onclick="likePost('${id}')">👍 Thích</button>
            <button onclick="toggleComment('${id}')">💬 Bình luận</button>
            <button onclick="reportPost('${id}')">🚨 Báo cáo</button>
        </div>
        <div id="comment-section-${id}" class="comment-section">
            <div class="comment-input-wrapper">
                <input type="text" id="comment-input-${id}" placeholder="Viết bình luận..." onkeypress="if(event.key==='Enter') addComment('${id}')">
            </div>
            <div id="comment-list-${id}"></div>
        </div>
    `;
    
    const list = document.getElementById("list");
    list.prepend(card);
    
    db.ref(`confessions/${id}/likes`).on('value', s => {
        const likeSpan = document.getElementById(`like-count-${id}`);
        if (likeSpan) likeSpan.innerText = s.val() || 0;
    });
    
    attachCommentsListener(id);
    updatePostNumbers();
}

// Lắng nghe bài viết mới
postsRef.on("child_added", (snapshot) => {
    if (!document.querySelector(`.card[data-id="${snapshot.key}"]`)) {
        renderPost(snapshot.key, snapshot.val());
    }
});

// Lắng nghe thay đổi like
postsRef.on("child_changed", (snapshot) => {
    const post = snapshot.val();
    const postId = snapshot.key;
    const likeSpan = document.getElementById(`like-count-${postId}`);
    if (likeSpan && likeSpan.innerText != (post.likes || 0)) {
        likeSpan.innerText = post.likes || 0;
    }
});

// Lắng nghe xóa bài
postsRef.on("child_removed", (snapshot) => {
    const card = document.querySelector(`.card[data-id="${snapshot.key}"]`);
    if (card) {
        card.remove();
        updatePostNumbers();
    }
});

// Load bài viết hiện có
function loadExistingPosts() {
    postsRef.once("value", (snapshot) => {
        const posts = [];
        snapshot.forEach(child => {
            posts.push({
                id: child.key,
                ...child.val()
            });
        });
        
        posts.sort((a, b) => b.timestamp - a.timestamp);
        
        const list = document.getElementById("list");
        list.innerHTML = '';
        
        let counter = posts.length;
        posts.forEach(post => {
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-id', post.id);
            
            card.innerHTML = `
                <div class="post-header">
                    <span class="post-number">#${counter--}</span>
                    <span class="post-author">Ẩn danh</span>
                    <span class="post-time">${formatTime(post.timestamp)}</span>
                    ${isToday(post.timestamp) ? '<span class="today-badge">Hôm nay</span>' : ''}
                </div>
                <div class="post-content">${escapeHtml(post.content)}</div>
                <div class="post-stats">
                    <span>👍 <span id="like-count-${post.id}">${post.likes || 0}</span></span>
                    <span>💬 <span id="comment-count-${post.id}">Đang tải...</span></span>
                </div>
                <div class="post-actions">
                    <button onclick="likePost('${post.id}')">👍 Thích</button>
                    <button onclick="toggleComment('${post.id}')">💬 Bình luận</button>
                    <button onclick="reportPost('${post.id}')">🚨 Báo cáo</button>
                </div>
                <div id="comment-section-${post.id}" class="comment-section">
                    <div class="comment-input-wrapper">
                        <input type="text" id="comment-input-${post.id}" placeholder="Viết bình luận..." onkeypress="if(event.key==='Enter') addComment('${post.id}')">
                    </div>
                    <div id="comment-list-${post.id}"></div>
                </div>
            `;
            
            list.appendChild(card);
            
            db.ref(`confessions/${post.id}/likes`).on('value', s => {
                const span = document.getElementById(`like-count-${post.id}`);
                if (span) span.innerText = s.val() || 0;
            });
            
            attachCommentsListener(post.id);
        });
        
        postCounter = posts.length;
    });
}

// Khởi động
loadExistingPosts();

console.log("✅ Diễn đàn đã sẵn sàng!");
</script>
</body>
</html>
