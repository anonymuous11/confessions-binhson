<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông báo</title>

<style>
body {
    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    background-image: url("pic/logooo.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    /* font đẹp + hỗ trợ tiếng Việt */
    font-family: "Segoe UI", Tahoma, Arial, sans-serif;
}

.container {
    text-align: center;
    max-width: 650px;

    background: rgba(255, 255, 255, 0.8);
    padding: 35px;
    border-radius: 15px;

    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 {
    margin-bottom: 20px;
    font-weight: 900;
    color: #000;
}

p {
    line-height: 1.6;
    color: #222;
    font-weight: 600;
}
</style>

</head>
<body>

<div class="container">
    <h1>ĐÓNG WEB ĐỂ UPDATE<br>TÍNH NĂNG DUYỆT BÀI</h1>

    <p>
        TRANG WEB NÀY VỚI MỤC ĐÍCH TRÒ CHUYỆN VÀ HỌC TẬP<br>
        KHÔNG DÙNG ĐỂ BÔI NHỌ NGƯỜI KHÁC
    </p>
</div>

</body>
</html>
